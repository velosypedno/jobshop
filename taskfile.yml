version: '3'

vars:
  DEFAULT_DIR: default
  DEFAULT_CONFIG: "{{.DEFAULT_DIR}}/config.json"
  DEFAULT_ORDER: "{{.DEFAULT_DIR}}/order.json"
  BINARY_NAME: scheduler

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list-all

  setup:
    desc: Copy example configurations and orders to the default directory
    cmds:
      - mkdir -p {{.DEFAULT_DIR}}
      - cp example/config.json {{.DEFAULT_CONFIG}}
      - cp example/order.json {{.DEFAULT_ORDER}}
    status:
      - test -f {{.DEFAULT_CONFIG}}
      - test -f {{.DEFAULT_ORDER}}

  build:
    desc: Build the binary
    cmds:
      - go build -o {{.BINARY_NAME}} cmd/main.go

  run:
    desc: Run the application with flags
    summary: |
      Runs the program using named flags.
      Example: task run -- -n my_test_plan
      Example: task run -- -c custom_config.json -o custom_orders.json
    cmds:
      - go run cmd/main.go --config {{.CONFIG | default .DEFAULT_CONFIG}} --orders {{.ORDER | default .DEFAULT_ORDER}} {{.CLI_ARGS}}

  help:
    desc: Show CLI help
    cmds:
      - go run cmd/main.go --help
  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  vendor:
    desc: Create vendor directory
    cmds:
      - go mod vendor

  download:
    desc: Download dependencies
    cmds:
      - go mod download

  lint:
    desc: Run local linter config 
    cmds:
      - golangci-lint run

  install:linter:
    desc: Install linter
    cmds:
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest