version: '3'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list-all
  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  vendor:
    desc: Create vendor directory
    cmds:
      - go mod vendor

  download:
    desc: Download dependencies
    cmds:
      - go mod download

  lint:
    desc: Run local linter config 
    cmds:
      - golangci-lint run

  install:linter:
    desc: Install linter
    cmds:
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.4.0